<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NOVA AI | Mobil Sorgu Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #010105);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* Arka Plan - Mobil için optimize */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* Ana Container - Mobil Tam Genişlik */
        .app-container {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 12px;
            position: relative;
            z-index: 2;
        }

        /* Header - Küçük ve Şık */
        .hero-header {
            background: rgba(10, 20, 40, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 20px 16px;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
        }

        .hamburger-menu {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
            border: 1px solid cyan;
            z-index: 10;
        }

        .hamburger-menu span {
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        .hero-title {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #fff, cyan, magenta);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-subtitle {
            font-size: 0.7rem;
            margin-top: 6px;
            opacity: 0.8;
        }

        .menu-hint {
            font-size: 0.65rem;
            margin-top: 8px;
            color: cyan;
        }

        /* Side Menu - Mobil için optimize */
        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(5, 10, 25, 0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            transition: left 0.3s ease;
            box-shadow: 5px 0 30px rgba(0, 255, 255, 0.2);
            border-right: 1px solid cyan;
            padding: 20px 12px;
            overflow-y: auto;
        }

        .side-menu.open {
            left: 0;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid cyan;
        }

        .menu-header h3 {
            font-size: 1rem;
            color: cyan;
        }

        .close-menu {
            font-size: 24px;
            cursor: pointer;
            color: cyan;
        }

        .menu-category {
            margin: 15px 0 8px 0;
            color: cyan;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 6px 0;
            cursor: pointer;
            transition: 0.2s;
            border-left: 2px solid cyan;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:active {
            background: rgba(0, 255, 255, 0.2);
            transform: translateX(4px);
        }

        /* Sorgu Paneli - Mobil uyumlu */
        .query-panel {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px;
            margin-top: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .query-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: cyan;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0;
        }

        .input-field {
            width: 100%;
        }

        .input-field label {
            display: block;
            font-size: 0.7rem;
            margin-bottom: 5px;
            color: #8cc9ff;
        }

        .input-field input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
        }

        .input-field input:focus {
            border-color: cyan;
            outline: none;
        }

        button {
            background: linear-gradient(135deg, cyan, magenta);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            margin: 4px;
        }

        button:active {
            transform: scale(0.97);
        }

        .result-area {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 16px;
            padding: 14px;
            margin-top: 15px;
            max-height: 350px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            border-left: 3px solid cyan;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Robot Butonu - Küçük ve Şık */
        .robot-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, cyan, magenta);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 150;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: 0.2s;
            border: 2px solid white;
        }

        .robot-btn:active {
            transform: scale(0.95);
        }

        .robot-btn span {
            font-size: 32px;
        }

        /* AI Asistan - Açılır Kapanır Mobil Pencere */
        .ai-assistant {
            position: fixed;
            bottom: 85px;
            right: 20px;
            width: calc(100% - 40px);
            max-width: 350px;
            background: rgba(5, 10, 25, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid cyan;
            z-index: 140;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .ai-assistant.closed {
            display: none;
        }

        .ai-header {
            background: linear-gradient(135deg, cyan, magenta);
            padding: 12px 15px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-header h4 {
            font-size: 0.85rem;
        }

        .ai-close {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
        }

        .ai-messages {
            height: 300px;
            overflow-y: auto;
            padding: 12px;
        }

        .ai-message {
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .ai-message.bot {
            background: rgba(0, 255, 255, 0.1);
            border-left: 2px solid cyan;
        }

        .ai-message.user {
            background: rgba(255, 0, 255, 0.1);
            border-right: 2px solid magenta;
            text-align: right;
        }

        .ai-input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
        }

        .ai-input-area input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid cyan;
            border-radius: 20px;
            color: white;
            font-size: 0.75rem;
        }

        .quick-buttons {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .quick-btn {
            background: rgba(0, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.65rem;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            font-size: 0.6rem;
            margin-top: 20px;
            opacity: 0.5;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="cosmic-bg" id="cosmicBg"></div>

<div class="app-container">
    <div class="hero-header">
        <div class="hamburger-menu" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div>
            <h1 class="hero-title">✨ NOVA AI ✨</h1>
            <p class="hero-subtitle">Dünyada Olmayan Sorgu Teknolojisi</p>
            <p class="menu-hint">☰ Menüden sorgu seç</p>
        </div>
    </div>

    <div id="queryPanel" class="query-panel">
        <!-- Dinamik sorgu paneli -->
    </div>
    <footer>🔒 NOVA AI | Gelişmiş Yapay Zeka | Mobil Optimize</footer>
</div>

<!-- Robot Butonu -->
<div class="robot-btn" id="robotBtn">
    <span>🤖</span>
</div>

<!-- AI Asistan Açılır Pencere -->
<div class="ai-assistant closed" id="aiAssistant">
    <div class="ai-header">
        <h4>🧠 NOVA AI Asistan</h4>
        <button class="ai-close" id="aiCloseBtn">✖</button>
    </div>
    <div class="ai-messages" id="aiMessages">
        <div class="ai-message bot">
            ✨ Merhaba! Ben NOVA AI.<br>
            📌 Sorgu yap, analiz et, rapor al.<br>
            💬 "yardım" yazarak komutları gör.
        </div>
    </div>
    <div class="quick-buttons">
        <div class="quick-btn" data-action="analyze">📊 Analiz</div>
        <div class="quick-btn" data-action="format">🎨 Format</div>
        <div class="quick-btn" data-action="report">📋 Rapor</div>
        <div class="quick-btn" data-action="export">📎 CSV</div>
        <div class="quick-btn" data-action="help">❓ Yardım</div>
    </div>
    <div class="ai-input-area">
        <input type="text" id="aiInput" placeholder="AI'ya sor...">
        <button id="aiSendBtn">➤</button>
    </div>
</div>

<script>
    // ========== KONFİGÜRASYON ==========
    const API_BASE = "https://apiservices.alwaysdata.net/apiservices";
    const CUSTOM_UA = "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15";
    
    // Tüm Sorgu Tipleri
    const QUERIES = {
        tc: { name: "🔍 TC Kimlik", params: ["tc"], placeholders: ["11 haneli TC"], build: (p) => `${API_BASE}/tc.php?tc=${p.tc}` },
        tcpro: { name: "⭐ TC PRO", params: ["tc"], placeholders: ["11 haneli TC"], build: (p) => `${API_BASE}/tcpro.php?tc=${p.tc}` },
        adsoyad: { name: "📛 Ad Soyad", params: ["ad", "soyad"], placeholders: ["Ad", "Soyad"], build: (p) => `${API_BASE}/adsoyad.php?ad=${p.ad}&soyad=${p.soyad}` },
        adsoyadpro: { name: "📇 Ad Soyad PRO", params: ["ad", "soyad", "il"], placeholders: ["Ad", "Soyad", "İl"], build: (p) => `${API_BASE}/adsoyadpro.php?ad=${p.ad}&soyad=${p.soyad}&il=${p.il}` },
        aile: { name: "👪 Aile", params: ["tc"], placeholders: ["11 haneli TC"], build: (p) => `${API_BASE}/aile.php?tc=${p.tc}` },
        ailepro: { name: "🏡 Aile PRO", params: ["tc"], placeholders: ["11 haneli TC"], build: (p) => `${API_BASE}/ailepro.php?tc=${p.tc}` },
        kardes: { name: "👥 Kardeş", params: ["tc"], placeholders: ["11 haneli TC"], build: (p) => `${API_BASE}/kardes.php?tc=${p.tc}` },
        adres: { name: "🏠 Adres", params: ["tc"], placeholders: ["11 haneli TC"], build: (p) => `${API_BASE}/adres.php?tc=${p.tc}` },
        iban: { name: "💳 IBAN", params: ["iban"], placeholders: ["IBAN no"], build: (p) => `${API_BASE}/iban.php?iban=${p.iban}` },
        operator: { name: "📱 GSM Operatör", params: ["gsm"], placeholders: ["GSM (10 haneli)"], build: (p) => `${API_BASE}/gncloperator.php?numara=${p.gsm}` },
        tcgsm: { name: "📞 TC'den GSM", params: ["tc"], placeholders: ["11 haneli TC"], build: (p) => `${API_BASE}/tcgsm.php?tc=${p.tc}` }
    };
    
    let activeQuery = "tc";
    let lastResult = null;
    let lastRawResult = "";
    let sideMenuOpen = false;
    
    // ========== TEMİZLEME ==========
    function cleanResponse(data) {
        if (!data) return data;
        const cleaned = JSON.parse(JSON.stringify(data));
        const removeFields = (obj) => {
            if (!obj || typeof obj !== 'object') return;
            if (Array.isArray(obj)) { obj.forEach(removeFields); return; }
            if (obj.hasOwnProperty('developer')) delete obj.developer;
            if (obj.hasOwnProperty('version')) delete obj.version;
            for (let key in obj) {
                if (obj[key] && typeof obj[key] === 'object') removeFields(obj[key]);
            }
        };
        removeFields(cleaned);
        return cleaned;
    }
    
    async function fastFetch(url) {
        try {
            const resp = await fetch(url, {
                headers: { "User-Agent": CUSTOM_UA, "Accept": "application/json" }
            });
            if (!resp.ok) throw new Error();
            const json = await resp.json();
            return cleanResponse(json);
        } catch(err) {
            return { success: false, error: "Bağlantı hatası" };
        }
    }
    
    // ========== SORGU ==========
    async function executeQuery() {
        const def = QUERIES[activeQuery];
        const params = {};
        
        for (let i = 0; i < def.params.length; i++) {
            const p = def.params[i];
            const input = document.getElementById(`param_${p}`);
            if (!input || !input.value.trim()) {
                addAIMessage(`❌ "${p}" alanını doldur!`, false);
                return;
            }
            params[p] = encodeURIComponent(input.value.trim());
        }
        
        const url = def.build(params);
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = "⏳ Sorgulanıyor...";
        
        addAIMessage(`🔍 "${def.name}" sorgulanıyor...`, false);
        
        const data = await fastFetch(url);
        lastResult = data;
        lastRawResult = JSON.stringify(data, null, 2);
        
        resultDiv.innerHTML = `<pre style="margin:0; white-space:pre-wrap;">${escapeHtml(lastRawResult)}</pre>`;
        
        const lines = lastRawResult.split('\n').length;
        addAIMessage(`✅ Tamamlandı! ${lines} satır veri.`, false);
    }
    
    // ========== AI FONKSİYONLARI ==========
    function addAIMessage(message, isUser = true) {
        const messagesDiv = document.getElementById("aiMessages");
        const msgDiv = document.createElement("div");
        msgDiv.className = `ai-message ${isUser ? 'user' : 'bot'}`;
        msgDiv.innerHTML = isUser ? `👤 ${message}` : `🤖 ${message}`;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        if (messagesDiv.children.length > 40) {
            messagesDiv.removeChild(messagesDiv.children[0]);
        }
    }
    
    function analyzeResult() {
        if (!lastResult) {
            addAIMessage("⚠️ Önce sorgu yap!", false);
            return;
        }
        
        addAIMessage("📊 Analiz ediliyor...", false);
        
        setTimeout(() => {
            const hasData = lastResult.success !== false;
            const resultCount = lastResult.results ? lastResult.results.length : (lastResult.aile_bilgileri ? lastResult.aile_bilgileri.kayitlar?.length : 0);
            
            let analysis = `🔍 Sonuç: ${hasData ? '✅ Başarılı' : '❌ Başarısız'}\n`;
            analysis += `📦 Boyut: ${(lastRawResult.length/1024).toFixed(1)} KB\n`;
            analysis += `📄 Kayıt: ${resultCount || '?'}\n`;
            
            if (lastResult.results && lastResult.results[0]) {
                const first = lastResult.results[0];
                if (first.ADI) analysis += `👤 ${first.ADI} ${first.SOYADI || ''}`;
            }
            addAIMessage(analysis, false);
        }, 300);
    }
    
    function formatResult() {
        if (!lastRawResult) {
            addAIMessage("⚠️ Önce sorgu yap!", false);
            return;
        }
        try {
            const parsed = JSON.parse(lastRawResult);
            const formatted = JSON.stringify(parsed, null, 4);
            document.getElementById("resultArea").innerHTML = `<pre style="margin:0;">${escapeHtml(formatted)}</pre>`;
            addAIMessage("✅ Formatlandı!", false);
        } catch(e) {
            addAIMessage("❌ Hata!", false);
        }
    }
    
    function generateReport() {
        if (!lastResult) {
            addAIMessage("⚠️ Önce sorgu yap!", false);
            return;
        }
        
        const date = new Date().toLocaleString();
        let report = `📋 NOVA RAPOR\n══════════\n📅 ${date}\n🔍 ${QUERIES[activeQuery].name}\n📦 ${(lastRawResult.length/1024).toFixed(1)} KB\n📄 ${lastRawResult.split('\n').length} satır`;
        
        if (lastResult.results) {
            report += `\n👥 ${lastResult.results.length} kayıt`;
        }
        
        addAIMessage(report, false);
    }
    
    function exportToCSV() {
        if (!lastResult || !lastResult.results) {
            addAIMessage("⚠️ CSV için veri yok!", false);
            return;
        }
        
        try {
            const data = lastResult.results;
            const headers = Object.keys(data[0]);
            let csv = headers.join(',') + '\n';
            data.forEach(row => {
                const values = headers.map(h => `"${(row[h] || '').toString().replace(/"/g, '""')}"`);
                csv += values.join(',') + '\n';
            });
            
            const blob = new Blob([csv], {type: "text/csv"});
            const a = document.createElement("a");
            const url = URL.createObjectURL(blob);
            a.download = `nova_${Date.now()}.csv`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
            addAIMessage(`✅ CSV dışa aktarıldı! ${data.length} kayıt`, false);
        } catch(e) {
            addAIMessage("❌ CSV hatası!", false);
        }
    }
    
    function aiHelp() {
        const help = `📚 NOVA AI Komutları:\n\n🔹 sorgula - Sorguyu çalıştır\n🔹 analiz et - Sonucu analiz et\n🔹 formatla - Veriyi düzenle\n🔹 rapor al - Rapor oluştur\n🔹 csv aktar - CSV dışa aktar\n🔹 indir - TXT indir\n🔹 temizle - Sonuçları temizle`;
        addAIMessage(help, false);
    }
    
    function downloadTxt() {
        if (!lastRawResult) {
            addAIMessage("⚠️ Önce sorgu yap!", false);
            return;
        }
        const blob = new Blob([lastRawResult], {type: "text/plain"});
        const a = document.createElement("a");
        const url = URL.createObjectURL(blob);
        a.download = `nova_${Date.now()}.txt`;
        a.href = url;
        a.click();
        URL.revokeObjectURL(url);
        addAIMessage("📥 İndiriliyor...", false);
    }
    
    function clearResult() {
        document.getElementById("resultArea").innerHTML = "Sorgu sonucu burada...";
        lastResult = null;
        lastRawResult = "";
        addAIMessage("🧹 Temizlendi.", false);
    }
    
    // ========== PANEL RENDER ==========
    function renderQueryPanel() {
        const def = QUERIES[activeQuery];
        const inputsHtml = def.params.map((p, idx) => `
            <div class="input-field">
                <label>${p.toUpperCase()}</label>
                <input type="text" id="param_${p}" placeholder="${def.placeholders[idx] || p}" autocomplete="off">
            </div>
        `).join('');
        
        const panelHtml = `
            <h3 class="query-title">${def.name}</h3>
            <div class="input-group">
                ${inputsHtml}
            </div>
            <div class="button-group">
                <button id="executeQueryBtn">🚀 Sorgula</button>
                <button id="downloadBtn">📥 İndir</button>
                <button id="clearBtn">🗑️ Temizle</button>
            </div>
            <div id="resultArea" class="result-area">Sorgu sonucu burada...</div>
        `;
        
        document.getElementById("queryPanel").innerHTML = panelHtml;
        
        document.getElementById("executeQueryBtn").addEventListener("click", executeQuery);
        document.getElementById("downloadBtn").addEventListener("click", downloadTxt);
        document.getElementById("clearBtn").addEventListener("click", clearResult);
    }
    
    // ========== SIDE MENU ==========
    function buildSideMenu() {
        let existing = document.getElementById("sideMenu");
        if (existing) existing.remove();
        
        const menuDiv = document.createElement("div");
        menuDiv.id = "sideMenu";
        menuDiv.className = "side-menu";
        
        let menuHtml = `
            <div class="menu-header">
                <h3>🌀 NOVA MENÜ</h3>
                <div class="close-menu" id="closeMenuBtn">✖</div>
            </div>
            <div class="menu-category">📌 SORGULAR (11)</div>
        `;
        
        for (let [key, val] of Object.entries(QUERIES)) {
            menuHtml += `<div class="menu-item" data-query="${key}">${val.name}</div>`;
        }
        
        menuHtml += `<div class="menu-category">⚙️ AI AKSİYON</div>`;
        menuHtml += `<div class="menu-item" data-action="analyze">📊 Analiz Et</div>`;
        menuHtml += `<div class="menu-item" data-action="format">🎨 Formatla</div>`;
        menuHtml += `<div class="menu-item" data-action="report">📋 Rapor Al</div>`;
        menuHtml += `<div class="menu-item" data-action="export">📎 CSV Aktar</div>`;
        menuHtml += `<div class="menu-item" data-action="help">❓ Yardım</div>`;
        
        menuDiv.innerHTML = menuHtml;
        document.body.appendChild(menuDiv);
        
        document.querySelectorAll(".menu-item[data-query]").forEach(el => {
            el.addEventListener("click", () => {
                activeQuery = el.dataset.query;
                renderQueryPanel();
                toggleSideMenu(false);
                addAIMessage(`🔄 "${QUERIES[activeQuery].name}" aktif`, false);
            });
        });
        
        document.querySelectorAll(".menu-item[data-action]").forEach(el => {
            el.addEventListener("click", () => {
                const action = el.dataset.action;
                if (action === "analyze") analyzeResult();
                else if (action === "format") formatResult();
                else if (action === "report") generateReport();
                else if (action === "export") exportToCSV();
                else if (action === "help") aiHelp();
                toggleSideMenu(false);
            });
        });
        
        document.getElementById("closeMenuBtn").addEventListener("click", () => toggleSideMenu(false));
    }
    
    function toggleSideMenu(open) {
        const menu = document.getElementById("sideMenu");
        if (!menu) return;
        if (open) {
            menu.classList.add("open");
            sideMenuOpen = true;
        } else {
            menu.classList.remove("open");
            sideMenuOpen = false;
        }
    }
    
    // ========== AI ASİSTAN ==========
    function initAIChat() {
        const aiInput = document.getElementById("aiInput");
        const aiSend = document.getElementById("aiSendBtn");
        const robotBtn = document.getElementById("robotBtn");
        const aiAssistant = document.getElementById("aiAssistant");
        const aiClose = document.getElementById("aiCloseBtn");
        
        let isOpen = false;
        
        robotBtn.addEventListener("click", () => {
            isOpen = !isOpen;
            if (isOpen) {
                aiAssistant.classList.remove("closed");
            } else {
                aiAssistant.classList.add("closed");
            }
        });
        
        aiClose.addEventListener("click", () => {
            isOpen = false;
            aiAssistant.classList.add("closed");
        });
        
        aiSend.addEventListener("click", () => {
            const message = aiInput.value.trim();
            if (!message) return;
            addAIMessage(message, true);
            aiInput.value = "";
            
            setTimeout(() => {
                const msg = message.toLowerCase();
                if (msg.includes("sorgula")) executeQuery();
                else if (msg.includes("analiz")) analyzeResult();
                else if (msg.includes("format")) formatResult();
                else if (msg.includes("rapor")) generateReport();
                else if (msg.includes("csv")) exportToCSV();
                else if (msg.includes("indir")) downloadTxt();
                else if (msg.includes("temizle")) clearResult();
                else if (msg.includes("yardım")) aiHelp();
                else addAIMessage(`💡 "${QUERIES[activeQuery].name}" aktif. "yardım" yaz.`, false);
            }, 200);
        });
        
        aiInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") aiSend.click();
        });
        
        document.querySelectorAll(".quick-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const action = btn.dataset.action;
                if (action === "analyze") analyzeResult();
                else if (action === "format") formatResult();
                else if (action === "report") generateReport();
                else if (action === "export") exportToCSV();
                else if (action === "help") aiHelp();
            });
        });
    }
    
    // ========== ARKA PLAN ==========
    function createBackground() {
        const bg = document.getElementById("cosmicBg");
        for (let i = 0; i < 150; i++) {
            const star = document.createElement("div");
            star.className = "star";
            star.style.width = Math.random() * 2 + 1 + "px";
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            star.style.animationDelay = Math.random() * 5 + "s";
            bg.appendChild(star);
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== BAŞLAT ==========
    createBackground();
    renderQueryPanel();
    buildSideMenu();
    initAIChat();
    
    document.getElementById("hamburgerBtn").addEventListener("click", () => {
        buildSideMenu();
        toggleSideMenu(true);
    });
    
    document.addEventListener("click", function(e) {
        const menu = document.getElementById("sideMenu");
        if (sideMenuOpen && menu && !menu.contains(e.target) && !e.target.closest(".hamburger-menu")) {
            toggleSideMenu(false);
        }
    });
    
    addAIMessage("✨ NOVA AI hazır! Sorgu seç ve başla.", false);
    
    console.log("%c🤖 NOVA AI | Mobil Sorgu Paneli Aktif", "color: cyan; font-size: 14px");
</script>
</body>
</html>
