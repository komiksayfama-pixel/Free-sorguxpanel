<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NOVA AI | Gelişmiş Sorgu Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #0a0a2a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* Arka Plan GIF */
        .gif-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url('https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUydGsxbnc5OGdvZDl1ZmRuaHVpYnB2endxMngwZHAxYWN4NzdycHFvcCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/smGpsxCQzXwDS/giphy.gif') center/cover no-repeat;
            opacity: 0.08;
        }

        /* Yuvarlak Daire GIF - Geçiş Efekti */
        .transition-gif {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: url('https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUydGsxbnc5OGdvZDl1ZmRuaHVpYnB2endxMngwZHAxYWN4NzdycHFvcCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/smGpsxCQzXwDS/giphy.gif') center/cover no-repeat;
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
            animation: rotateGlow 15s infinite ease-in-out;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }

        @keyframes rotateGlow {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.15; }
            33% { transform: translate(40px, -40px) scale(1.05) rotate(120deg); opacity: 0.25; }
            66% { transform: translate(-30px, 30px) scale(0.95) rotate(240deg); opacity: 0.2; }
        }

        /* Ana Container - Mobil */
        .app-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px 16px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
        }

        .hamburger {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 42px;
            height: 42px;
            cursor: pointer;
            background: rgba(0, 255, 255, 0.15);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
            border: 1px solid cyan;
        }

        .hamburger span {
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, cyan, magenta);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 0.7rem;
            margin-top: 6px;
            opacity: 0.7;
        }

        .menu-hint {
            font-size: 0.6rem;
            margin-top: 8px;
            color: cyan;
        }

        /* Side Menu */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100vh;
            background: rgba(5, 10, 25, 0.98);
            backdrop-filter: blur(25px);
            z-index: 2000;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 5px 0 40px rgba(0, 255, 255, 0.2);
            border-right: 2px solid cyan;
            padding: 20px 12px;
            overflow-y: auto;
        }

        .side-menu.open {
            left: 0;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid cyan;
        }

        .menu-header h3 {
            font-size: 1.1rem;
            color: cyan;
        }

        .close-menu {
            font-size: 26px;
            cursor: pointer;
            color: cyan;
        }

        .menu-category {
            margin: 15px 0 8px 0;
            color: cyan;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 6px 0;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid cyan;
            font-size: 0.8rem;
        }

        .menu-item:active {
            background: rgba(0, 255, 255, 0.2);
            transform: translateX(5px);
        }

        /* Auth Card */
        .auth-card {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .auth-card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: cyan;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 0.85rem;
        }

        .auth-btn {
            background: linear-gradient(135deg, cyan, magenta);
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .switch-auth {
            margin-top: 15px;
            color: cyan;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .auth-gif {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 20px auto 0;
            background: url('https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUydGsxbnc5OGdvZDl1ZmRuaHVpYnB2endxMngwZHAxYWN4NzdycHFvcCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/smGpsxCQzXwDS/giphy.gif') center/cover no-repeat;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            animation: gentlePulse 2s infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px cyan; }
            50% { transform: scale(1.03); box-shadow: 0 0 25px magenta; }
        }

        /* Query Panel */
        .query-panel {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .query-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: cyan;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-field input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 0.85rem;
            text-align: center;
        }

        .input-field input:focus {
            border-color: cyan;
            outline: none;
            box-shadow: 0 0 10px cyan;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, cyan, magenta);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        .result-area {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 16px;
            max-height: 400px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            border-left: 3px solid cyan;
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 15px;
        }

        .logout-btn {
            background: rgba(255, 50, 100, 0.8);
            width: 100%;
            margin-top: 20px;
            padding: 10px;
        }

        footer {
            text-align: center;
            font-size: 0.55rem;
            margin-top: 20px;
            opacity: 0.5;
        }

        /* Robot Button */
        .robot-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, cyan, magenta);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 150;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            border: 2px solid white;
            transition: 0.2s;
        }

        .robot-btn:active {
            transform: scale(0.95);
        }

        .robot-btn span {
            font-size: 32px;
        }

        /* AI Assistant */
        .ai-assistant {
            position: fixed;
            bottom: 85px;
            right: 20px;
            width: 320px;
            background: rgba(5, 10, 25, 0.98);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            border: 1px solid cyan;
            z-index: 140;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .ai-assistant.closed {
            display: none;
        }

        .ai-header {
            background: linear-gradient(135deg, cyan, magenta);
            padding: 12px 16px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-header h4 {
            font-size: 0.85rem;
        }

        .ai-close {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .ai-messages {
            height: 280px;
            overflow-y: auto;
            padding: 12px;
        }

        .ai-message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
        }

        .ai-message.bot {
            background: rgba(0, 255, 255, 0.1);
            border-left: 2px solid cyan;
        }

        .ai-message.user {
            background: rgba(255, 0, 255, 0.1);
            border-right: 2px solid magenta;
            text-align: right;
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .quick-btn {
            background: rgba(0, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.6rem;
            cursor: pointer;
        }

        .ai-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .ai-input-area input {
            flex: 1;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid cyan;
            border-radius: 25px;
            color: white;
            font-size: 0.7rem;
        }

        .ai-input-area button {
            padding: 8px 16px;
            margin: 0;
        }
    </style>
</head>
<body>

<!-- Arka Plan GIF -->
<div class="gif-bg"></div>

<!-- Yuvarlak Daire GIF - Geçiş Efekti -->
<div class="transition-gif" style="top: -100px; left: -100px;"></div>
<div class="transition-gif" style="bottom: -100px; right: -100px; width: 200px; height: 200px; animation-delay: 5s;"></div>
<div class="transition-gif" style="top: 30%; left: 60%; width: 150px; height: 150px; animation-delay: 2s; animation-duration: 12s;"></div>

<div class="app-container" id="appRoot"></div>

<!-- Robot Butonu -->
<div class="robot-btn" id="robotBtn">
    <span>🤖</span>
</div>

<!-- AI Asistan -->
<div class="ai-assistant closed" id="aiAssistant">
    <div class="ai-header">
        <h4>🧠 NOVA AI Asistan</h4>
        <button class="ai-close" id="aiCloseBtn">✖</button>
    </div>
    <div class="ai-messages" id="aiMessages">
        <div class="ai-message bot">✨ Merhaba! Ben NOVA AI. Sana nasıl yardımcı olabilirim?</div>
    </div>
    <div class="quick-buttons">
        <div class="quick-btn" data-action="analyze">📊 Analiz</div>
        <div class="quick-btn" data-action="format">🎨 Format</div>
        <div class="quick-btn" data-action="report">📋 Rapor</div>
        <div class="quick-btn" data-action="help">❓ Yardım</div>
    </div>
    <div class="ai-input-area">
        <input type="text" id="aiInput" placeholder="AI'ya bir şey sor...">
        <button id="aiSendBtn">Gönder</button>
    </div>
</div>

<script>
    // ========== GİZLİLİK AYARLARI ==========
    // Konsola gizli mesaj
    console.log("%c🔒 Güvenli Mod Aktif | NOVA AI Sorgu Paneli", "color: cyan; font-size: 12px;");
    
    // Geliştirici araçlarını kontrol et (basit gizlilik)
    setInterval(() => {
        if (window.devtools && window.devtools.open) {
            console.clear();
            console.log("%c🔒 Güvenlik Uyarısı: Geliştirici araçları tespit edildi!", "color: red; font-size: 14px;");
        }
    }, 1000);
    
    // ========== KONFİGÜRASYON ==========
    const API_BASE = "https://apilerimya.onrender.com";
    const CUSTOM_UA = "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15";
    
    // Tüm Sorgu Tipleri (14 API)
    const QUERIES = {
        tc: { name: "🔍 TC Kimlik Sorgula", params: ["tc"], ph: ["11 haneli TC"], build: (p) => `${API_BASE}/tc?tc=${p.tc}&format=text` },
        tcmedeni: { name: "💍 TC Medeni/Cinsiyet", params: ["tc"], ph: ["11 haneli TC"], build: (p) => `${API_BASE}/tc-medenicinsiyet?tc=${p.tc}&format=text` },
        ailebirey: { name: "👨‍👩‍👧 Aile Birey Ara", params: ["name", "surname"], ph: ["Ad", "Soyad"], build: (p) => `${API_BASE}/ailebirey?name=${p.name}&surname=${p.surname}&format=text` },
        tcpro: { name: "⭐ TC PRO (Detaylı)", params: ["tc"], ph: ["11 haneli TC"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/tcpro.php?tc=${p.tc}` },
        adsoyad: { name: "📛 Ad Soyad Sorgula", params: ["ad", "soyad"], ph: ["Ad", "Soyad"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/adsoyad.php?ad=${p.ad}&soyad=${p.soyad}` },
        adsoyadpro: { name: "📇 Ad Soyad PRO", params: ["ad", "soyad", "il"], ph: ["Ad", "Soyad", "İl"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/adsoyadpro.php?ad=${p.ad}&soyad=${p.soyad}&il=${p.il}` },
        aile: { name: "👪 Aile Sorgula", params: ["tc"], ph: ["11 haneli TC"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/aile.php?tc=${p.tc}` },
        ailepro: { name: "🏡 Aile PRO", params: ["tc"], ph: ["11 haneli TC"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/ailepro.php?tc=${p.tc}` },
        kardes: { name: "👥 Kardeş Sorgula", params: ["tc"], ph: ["11 haneli TC"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/kardes.php?tc=${p.tc}` },
        adres: { name: "🏠 Adres Sorgula", params: ["tc"], ph: ["11 haneli TC"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/adres.php?tc=${p.tc}` },
        iban: { name: "💳 IBAN Sorgula", params: ["iban"], ph: ["IBAN no"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/iban.php?iban=${p.iban}` },
        operator: { name: "📱 GSM Operatör", params: ["gsm"], ph: ["GSM (10 haneli)"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/gncloperator.php?numara=${p.gsm}` },
        tcgsm: { name: "📞 TC'den GSM", params: ["tc"], ph: ["11 haneli TC"], build: (p) => `https://apiservices.alwaysdata.net/apiservices/tcgsm.php?tc=${p.tc}` }
    };
    
    let activeQuery = "tc";
    let lastResult = null;
    let lastRawResult = "";
    let currentUser = null;
    let sideMenuOpen = false;
    
    // ========== KULLANICI SİSTEMİ ==========
    function getUsers() {
        let u = localStorage.getItem("nova_users_v3");
        return u ? JSON.parse(u) : {};
    }
    
    function saveUsers(users) {
        localStorage.setItem("nova_users_v3", JSON.stringify(users));
    }
    
    function registerUser(username, password) {
        let users = getUsers();
        if (users[username]) return false;
        users[username] = { pwd: btoa(password), created: Date.now() };
        saveUsers(users);
        return true;
    }
    
    function loginUser(username, password) {
        let users = getUsers();
        if (!users[username]) return false;
        if (atob(users[username].pwd) === password) {
            currentUser = { username, loggedAt: Date.now() };
            localStorage.setItem("nova_session_v3", JSON.stringify(currentUser));
            return true;
        }
        return false;
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("nova_session_v3");
        renderAuth();
    }
    
    function checkSession() {
        let sess = localStorage.getItem("nova_session_v3");
        if (sess) {
            try {
                currentUser = JSON.parse(sess);
                return true;
            } catch(e) {}
        }
        return false;
    }
    
    // ========== API İŞLEMLERİ ==========
    function cleanResponse(data) {
        if (!data) return data;
        if (typeof data === 'string') {
            // Text formatındaki veriyi olduğu gibi göster
            return data;
        }
        const cleaned = JSON.parse(JSON.stringify(data));
        const removeFields = (obj) => {
            if (!obj || typeof obj !== 'object') return;
            if (Array.isArray(obj)) { obj.forEach(removeFields); return; }
            if (obj.hasOwnProperty('developer')) delete obj.developer;
            if (obj.hasOwnProperty('version')) delete obj.version;
            for (let key in obj) {
                if (obj[key] && typeof obj[key] === 'object') removeFields(obj[key]);
            }
        };
        removeFields(cleaned);
        return cleaned;
    }
    
    async function fastFetch(url) {
        try {
            const resp = await fetch(url, {
                headers: { "User-Agent": CUSTOM_UA, "Accept": "text/plain, application/json" }
            });
            if (!resp.ok) throw new Error();
            const contentType = resp.headers.get("content-type");
            if (contentType && contentType.includes("text/plain")) {
                const text = await resp.text();
                return text;
            }
            const json = await resp.json();
            return cleanResponse(json);
        } catch(err) {
            return { success: false, error: "Bağlantı hatası" };
        }
    }
    
    async function executeQuery() {
        const def = QUERIES[activeQuery];
        const params = {};
        
        for (let p of def.params) {
            const input = document.getElementById(`param_${p}`);
            if (!input || !input.value.trim()) {
                addAIMessage(`❌ Lütfen "${p}" alanını doldurun!`, false);
                return;
            }
            params[p] = encodeURIComponent(input.value.trim());
        }
        
        const url = def.build(params);
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = "⏳ Sorgulanıyor, lütfen bekleyin...";
        
        addAIMessage(`🔍 "${def.name}" sorgusu başlatıldı...`, false);
        
        const data = await fastFetch(url);
        lastResult = data;
        
        if (typeof data === 'string') {
            lastRawResult = data;
            resultDiv.innerHTML = `<pre style="margin:0; white-space:pre-wrap;">${escapeHtml(data)}</pre>`;
        } else {
            lastRawResult = JSON.stringify(data, null, 2);
            resultDiv.innerHTML = `<pre style="margin:0; white-space:pre-wrap;">${escapeHtml(lastRawResult)}</pre>`;
        }
        
        addAIMessage(`✅ Sorgu tamamlandı!`, false);
    }
    
    // ========== AI FONKSİYONLARI ==========
    function addAIMessage(message, isUser = true) {
        const messagesDiv = document.getElementById("aiMessages");
        const msgDiv = document.createElement("div");
        msgDiv.className = `ai-message ${isUser ? 'user' : 'bot'}`;
        msgDiv.innerHTML = isUser ? `👤 ${message}` : `🤖 ${message}`;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        if (messagesDiv.children.length > 40) {
            messagesDiv.removeChild(messagesDiv.children[0]);
        }
    }
    
    function analyzeResult() {
        if (!lastResult) {
            addAIMessage("⚠️ Önce bir sorgu yapmalısınız!", false);
            return;
        }
        const size = lastRawResult ? lastRawResult.length : JSON.stringify(lastResult).length;
        const lines = lastRawResult ? lastRawResult.split('\n').length : 0;
        addAIMessage(`📊 Veri boyutu: ${(size/1024).toFixed(2)} KB | ${lines} satır`, false);
    }
    
    function formatResult() {
        if (!lastRawResult && !lastResult) {
            addAIMessage("⚠️ Önce bir sorgu yapmalısınız!", false);
            return;
        }
        try {
            if (typeof lastResult === 'string') {
                // Text format zaten okunabilir
                addAIMessage("✅ Bu veri zaten metin formatında!", false);
            } else {
                const formatted = JSON.stringify(lastResult, null, 4);
                document.getElementById("resultArea").innerHTML = `<pre style="margin:0; white-space:pre-wrap;">${escapeHtml(formatted)}</pre>`;
                addAIMessage("✅ Veri formatlandı!", false);
            }
        } catch(e) {
            addAIMessage("❌ Formatlama hatası!", false);
        }
    }
    
    function generateReport() {
        if (!lastResult) {
            addAIMessage("⚠️ Önce bir sorgu yapmalısınız!", false);
            return;
        }
        const size = lastRawResult ? lastRawResult.length : JSON.stringify(lastResult).length;
        addAIMessage(`📋 Rapor: ${QUERIES[activeQuery].name} | ${(size/1024).toFixed(2)} KB`, false);
    }
    
    function aiHelp() {
        addAIMessage("📚 Komutlar:\n• sorgula - Sorguyu çalıştır\n• analiz et - Sonucu analiz et\n• formatla - Veriyi düzenle\n• rapor al - Rapor oluştur\n• indir - TXT indir\n• temizle - Temizle\n\n🔍 Toplam 13 farklı sorgu tipi mevcut!", false);
    }
    
    function downloadTxt() {
        if (!lastRawResult && !lastResult) {
            addAIMessage("⚠️ Önce bir sorgu yapmalısınız!", false);
            return;
        }
        const content = lastRawResult || JSON.stringify(lastResult, null, 2);
        const blob = new Blob([content], {type: "text/plain"});
        const a = document.createElement("a");
        const url = URL.createObjectURL(blob);
        a.download = `nova_sorgu_${Date.now()}.txt`;
        a.href = url;
        a.click();
        URL.revokeObjectURL(url);
        addAIMessage("📥 Dosya indiriliyor...", false);
    }
    
    function clearResult() {
        document.getElementById("resultArea").innerHTML = "Sorgu sonucu burada görünecek...";
        lastResult = null;
        lastRawResult = "";
        addAIMessage("🧹 Sonuç alanı temizlendi.", false);
    }
    
    // ========== PANEL RENDER ==========
    function renderQueryPanel() {
        const def = QUERIES[activeQuery];
        const inputsHtml = def.params.map((p, idx) => `
            <div class="input-field">
                <input type="text" id="param_${p}" placeholder="${def.ph[idx] || p}" autocomplete="off">
            </div>
        `).join('');
        
        const panelHtml = `
            <div class="header">
                <div class="hamburger" id="hamburgerBtn">
                    <span></span><span></span><span></span>
                </div>
                <div>
                    <div class="logo">✨ NOVA AI ✨</div>
                    <div class="subtitle">Gelişmiş Sorgu Paneli</div>
                    <div class="menu-hint">☰ Menüden sorgu tipini seçin</div>
                </div>
            </div>
            <div class="query-panel">
                <div class="query-title">${def.name}</div>
                <div class="input-group">${inputsHtml}</div>
                <div class="button-group">
                    <button id="executeQueryBtn">🚀 Sorgula</button>
                    <button id="downloadBtn">📥 İndir</button>
                    <button id="clearBtn">🗑️ Temizle</button>
                </div>
                <div id="resultArea" class="result-area">Sorgu sonucu burada görünecek...</div>
                <button id="logoutBtn" class="logout-btn">🚪 Çıkış Yap</button>
            </div>
            <footer>🔒 NOVA AI | Gelişmiş Sorgu Paneli | 13+ API</footer>
        `;
        
        document.getElementById("appRoot").innerHTML = panelHtml;
        
        document.getElementById("executeQueryBtn").addEventListener("click", executeQuery);
        document.getElementById("downloadBtn").addEventListener("click", downloadTxt);
        document.getElementById("clearBtn").addEventListener("click", clearResult);
        document.getElementById("logoutBtn").addEventListener("click", logout);
        document.getElementById("hamburgerBtn").addEventListener("click", () => { buildSideMenu(); toggleSideMenu(true); });
    }
    
    // ========== SIDE MENU ==========
    function buildSideMenu() {
        let existing = document.getElementById("sideMenu");
        if (existing) existing.remove();
        
        const menuDiv = document.createElement("div");
        menuDiv.id = "sideMenu";
        menuDiv.className = "side-menu";
        
        let menuHtml = `
            <div class="menu-header">
                <h3>🌀 NOVA MENÜ</h3>
                <div class="close-menu" id="closeMenuBtn">✖</div>
            </div>
            <div class="menu-category">📌 SORGULAR (13+)</div>
        `;
        
        for (let [key, val] of Object.entries(QUERIES)) {
            menuHtml += `<div class="menu-item" data-query="${key}">${val.name}</div>`;
        }
        
        menuHtml += `<div class="menu-category">⚙️ AI AKSİYONLAR</div>`;
        menuHtml += `<div class="menu-item" data-action="analyze">📊 Sonucu Analiz Et</div>`;
        menuHtml += `<div class="menu-item" data-action="format">🎨 Veriyi Formatla</div>`;
        menuHtml += `<div class="menu-item" data-action="report">📋 Rapor Al</div>`;
        menuHtml += `<div class="menu-item" data-action="help">❓ Yardım</div>`;
        
        menuDiv.innerHTML = menuHtml;
        document.body.appendChild(menuDiv);
        
        document.querySelectorAll(".menu-item[data-query]").forEach(el => {
            el.addEventListener("click", () => {
                activeQuery = el.dataset.query;
                renderQueryPanel();
                toggleSideMenu(false);
                addAIMessage(`🔄 "${QUERIES[activeQuery].name}" moduna geçildi.`, false);
            });
        });
        
        document.querySelectorAll(".menu-item[data-action]").forEach(el => {
            el.addEventListener("click", () => {
                const action = el.dataset.action;
                if (action === "analyze") analyzeResult();
                else if (action === "format") formatResult();
                else if (action === "report") generateReport();
                else if (action === "help") aiHelp();
                toggleSideMenu(false);
            });
        });
        
        document.getElementById("closeMenuBtn").addEventListener("click", () => toggleSideMenu(false));
    }
    
    function toggleSideMenu(open) {
        const menu = document.getElementById("sideMenu");
        if (!menu) return;
        if (open) {
            menu.classList.add("open");
            sideMenuOpen = true;
        } else {
            menu.classList.remove("open");
            sideMenuOpen = false;
        }
    }
    
    // ========== AUTH RENDER ==========
    let authMode = "login";
    
    function renderAuth() {
        const isLogin = authMode === "login";
        const html = `
            <div class="header" style="margin-bottom:20px;">
                <div>
                    <div class="logo">✨ NOVA AI ✨</div>
                    <div class="subtitle">Gelişmiş Sorgu Paneli</div>
                </div>
            </div>
            <div class="auth-card">
                <h2>${isLogin ? "🔐 GİRİŞ YAP" : "📝 KAYIT OL"}</h2>
                <input type="text" id="authUser" class="auth-input" placeholder="Kullanıcı Adı">
                <input type="password" id="authPass" class="auth-input" placeholder="Şifre">
                <button class="auth-btn" id="authBtn">${isLogin ? "Giriş Yap" : "Kayıt Ol"}</button>
                <div class="switch-auth" id="switchAuth">${isLogin ? "Hesabın yok mu? Kayıt ol" : "Zaten hesabın var mı? Giriş yap"}</div>
                <div id="authMsg" style="margin-top: 10px; font-size: 0.7rem; color: #ffaa66;"></div>
                <div class="auth-gif"></div>
            </div>
            <footer>🔒 NOVA AI | Gelişmiş Sorgu Paneli | 13+ API</footer>
        `;
        
        document.getElementById("appRoot").innerHTML = html;
        
        document.getElementById("authBtn").addEventListener("click", () => {
            const user = document.getElementById("authUser").value.trim();
            const pass = document.getElementById("authPass").value.trim();
            const msgDiv = document.getElementById("authMsg");
            
            if (!user || !pass) {
                msgDiv.innerText = "Kullanıcı adı ve şifre giriniz!";
                return;
            }
            
            if (isLogin) {
                if (loginUser(user, pass)) {
                    renderQueryPanel();
                } else {
                    msgDiv.innerText = "Hatalı kullanıcı adı veya şifre!";
                }
            } else {
                if (registerUser(user, pass)) {
                    msgDiv.innerText = "Kayıt başarılı! Şimdi giriş yapabilirsiniz.";
                    authMode = "login";
                    renderAuth();
                } else {
                    msgDiv.innerText = "Bu kullanıcı adı zaten alınmış!";
                }
            }
        });
        
        document.getElementById("switchAuth").addEventListener("click", () => {
            authMode = isLogin ? "register" : "login";
            renderAuth();
        });
    }
    
    // ========== AI ASİSTAN ==========
    function initAIChat() {
        const aiInput = document.getElementById("aiInput");
        const aiSend = document.getElementById("aiSendBtn");
        const robotBtn = document.getElementById("robotBtn");
        const aiAssistant = document.getElementById("aiAssistant");
        const aiClose = document.getElementById("aiCloseBtn");
        let isOpen = false;
        
        robotBtn.addEventListener("click", () => {
            isOpen = !isOpen;
            aiAssistant.classList.toggle("closed", !isOpen);
        });
        
        aiClose.addEventListener("click", () => {
            isOpen = false;
            aiAssistant.classList.add("closed");
        });
        
        aiSend.addEventListener("click", () => {
            const message = aiInput.value.trim();
            if (!message) return;
            addAIMessage(message, true);
            aiInput.value = "";
            
            setTimeout(() => {
                const msg = message.toLowerCase();
                if (msg.includes("sorgula")) executeQuery();
                else if (msg.includes("analiz")) analyzeResult();
                else if (msg.includes("format")) formatResult();
                else if (msg.includes("rapor")) generateReport();
                else if (msg.includes("indir")) downloadTxt();
                else if (msg.includes("temizle")) clearResult();
                else if (msg.includes("yardım")) aiHelp();
                else addAIMessage(`💬 "${QUERIES[activeQuery].name}" aktif. "yardım" yazarak komutları görebilirsiniz.`, false);
            }, 200);
        });
        
        aiInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") aiSend.click();
        });
        
        document.querySelectorAll(".quick-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const action = btn.dataset.action;
                if (action === "analyze") analyzeResult();
                else if (action === "format") formatResult();
                else if (action === "report") generateReport();
                else if (action === "help") aiHelp();
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== BAŞLAT ==========
    if (checkSession()) {
        renderQueryPanel();
    } else {
        renderAuth();
    }
    
    initAIChat();
    
    document.addEventListener("click", function(e) {
        const menu = document.getElementById("sideMenu");
        if (sideMenuOpen && menu && !menu.contains(e.target) && !e.target.closest(".hamburger")) {
            toggleSideMenu(false);
        }
    });
    
    // Gizlilik için ekstra
    console.clear();
    console.log("%c🔒 NOVA AI | Gelişmiş Sorgu Paneli | Güvenli Mod Aktif", "color: cyan; font-size: 14px; font-weight: bold;");
</script>
</body>
</html>
