<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CCMUMYA Sorgu Paneli | Siberci Alemde</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            background: #0a0f1e;
            min-height: 100vh;
            color: #f0f3fa;
            overflow-x: hidden;
            position: relative;
        }

        /* ARKA PLAN GIF - DÜZELTİLDİ */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .gif-circle {
            width: 100vmax;
            height: 100vmax;
            max-width: 900px;
            max-height: 900px;
            border-radius: 50%;
            /* Çalışan GIF linki - doğrudan mp4 yerine çalışan bir GIF */
            background: url('https://media1.tenor.com/m/-3cLbJcZeqIAAAAC/hacker-hack.gif') center/cover no-repeat;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            opacity: 0.3;
            animation: slowPulse 8s infinite ease-in-out;
        }

        @keyframes slowPulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.3; }
        }

        /* basit overlay */
        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 25, 0.7);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 16px 20px 30px;
            position: relative;
            z-index: 2;
        }

        /* header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 24px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .logo-area h1 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #fff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-area p {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* hamburger buton */
        .hamburger {
            width: 44px;
            height: 44px;
            cursor: pointer;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
            border: 1px solid cyan;
        }
        .hamburger:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.02);
        }
        .hamburger span {
            width: 24px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        /* SIDEMENU */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100vh;
            background: rgba(6, 12, 24, 0.96);
            backdrop-filter: blur(16px);
            z-index: 1000;
            transition: left 0.25s ease;
            box-shadow: 2px 0 30px rgba(0,0,0,0.5);
            border-right: 1px solid cyan;
            padding: 25px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .side-menu.open {
            left: 0;
        }
        .menu-close {
            align-self: flex-end;
            background: none;
            border: none;
            color: cyan;
            font-size: 26px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .menu-item {
            background: rgba(255,255,255,0.04);
            border-radius: 40px;
            padding: 10px 16px;
            margin: 4px 0;
            cursor: pointer;
            transition: 0.15s;
            border-left: 3px solid cyan;
            font-size: 0.9rem;
        }
        .menu-item:hover {
            background: rgba(0, 255, 255, 0.15);
            transform: translateX(5px);
        }
        .logout-menu {
            margin-top: 30px;
            border-left-color: #ff5e7c;
        }

        /* kart */
        .welcome-card {
            background: rgba(20, 30, 55, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 25px 24px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid rgba(0,255,255,0.2);
        }

        .query-panel {
            background: rgba(12, 18, 32, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-top: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 18px 0;
        }
        .input-field {
            flex: 1;
            min-width: 160px;
        }
        .input-field label {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 5px;
            color: #7bc5ff;
        }
        .input-field input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #2c4466;
            border-radius: 28px;
            color: white;
            font-size: 0.85rem;
        }
        .input-field input:focus {
            border-color: cyan;
            outline: none;
        }
        button {
            background: linear-gradient(95deg, #009faa, #004c99);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
        }
        button:hover {
            filter: brightness(1.05);
            transform: scale(0.98);
        }
        .result-area {
            background: #03060ce0;
            border-radius: 24px;
            padding: 16px;
            margin-top: 18px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border-left: 4px solid cyan;
            max-height: 400px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .download-btn {
            background: #2c3e66;
            margin-top: 8px;
            display: inline-block;
        }
        .auth-card {
            max-width: 400px;
            margin: 40px auto;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
        }
        .switch-auth {
            margin-top: 14px;
            color: cyan;
            cursor: pointer;
            font-size: 0.85rem;
        }
        footer {
            text-align: center;
            font-size: 10px;
            margin-top: 40px;
            opacity: 0.5;
        }
        @media (max-width: 650px) {
            .app-container { padding: 12px; }
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="animated-bg">
    <div class="gif-circle"></div>
</div>
<div class="glass-overlay"></div>

<div class="app-container" id="appRoot"></div>

<script>
    (function() {
        // ========== GÜVENLİK & PERFORMANS ==========
        // Özel User-Agent (render dış dünya için)
        const CUSTOM_UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36";
        
        // API BASE
        const API_BASE = "https://apiservices.alwaysdata.net/apiservices";
        
        // ========== FİLTRE: developer ve sürüm temizleme ==========
        function cleanApiResponse(data) {
            if (!data || typeof data !== 'object') return data;
            // Kopya oluştur (mutasyon yapma)
            const cleaned = JSON.parse(JSON.stringify(data));
            // Rekürsif silme
            const removeFields = (obj) => {
                if (!obj || typeof obj !== 'object') return;
                if (Array.isArray(obj)) {
                    obj.forEach(item => removeFields(item));
                    return;
                }
                // silinecek anahtarlar
                if (obj.hasOwnProperty('developer')) delete obj.developer;
                if (obj.hasOwnProperty('version')) delete obj.version;
                // alt nesneler
                for (let key in obj) {
                    if (obj[key] && typeof obj[key] === 'object') {
                        removeFields(obj[key]);
                    }
                }
            };
            removeFields(cleaned);
            return cleaned;
        }
        
        // hızlı fetch (zaman aşımı 15sn)
        async function fastFetch(url) {
            try {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), 15000);
                const resp = await fetch(url, {
                    signal: controller.signal,
                    headers: {
                        "User-Agent": CUSTOM_UA,
                        "Accept": "application/json"
                    }
                });
                clearTimeout(tid);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const json = await resp.json();
                // temizle ve döndür
                return cleanApiResponse(json);
            } catch (err) {
                console.warn(err);
                return { success: false, error: "Bağlantı hatası veya zaman aşımı", message: err.message };
            }
        }
        
        // ========== KULLANICI YÖNETİMİ ==========
        let currentUser = null;
        
        function getUsers() {
            let u = localStorage.getItem("ccm_users");
            return u ? JSON.parse(u) : {};
        }
        function saveUsers(users) { localStorage.setItem("ccm_users", JSON.stringify(users)); }
        
        function saveSession(username) {
            currentUser = { username, loggedAt: Date.now() };
            localStorage.setItem("ccm_session", JSON.stringify(currentUser));
        }
        function loadSession() {
            let sess = localStorage.getItem("ccm_session");
            if (sess) {
                try { currentUser = JSON.parse(sess); return currentUser; } catch(e) {}
            }
            return null;
        }
        function logout() {
            currentUser = null;
            localStorage.removeItem("ccm_session");
            renderAuth();
        }
        
        function registerUser(username, password) {
            let users = getUsers();
            if (users[username]) return false;
            users[username] = { pwd: btoa(password), created: Date.now() };
            saveUsers(users);
            return true;
        }
        function loginUser(username, password) {
            let users = getUsers();
            if (!users[username]) return false;
            if (atob(users[username].pwd) === password) {
                saveSession(username);
                return true;
            }
            return false;
        }
        
        // ========== SORGU TANIMLARI (hızlı) ==========
        const QUERIES = {
            tc: { name: "TC Kimlik Sorgula", params: ["tc"], build: (p) => `${API_BASE}/tc.php?tc=${p.tc}` },
            tcpro: { name: "TC PRO (Detaylı)", params: ["tc"], build: (p) => `${API_BASE}/tcpro.php?tc=${p.tc}` },
            adsoyad: { name: "Ad Soyad Sorgu", params: ["ad","soyad"], build: (p) => `${API_BASE}/adsoyad.php?ad=${p.ad}&soyad=${p.soyad}` },
            adsoyadpro: { name: "Ad Soyad PRO (İl)", params: ["ad","soyad","il"], build: (p) => `${API_BASE}/adsoyadpro.php?ad=${p.ad}&soyad=${p.soyad}&il=${p.il}` },
            aile: { name: "Aile Sorgula", params: ["tc"], build: (p) => `${API_BASE}/aile.php?tc=${p.tc}` },
            ailepro: { name: "Aile PRO", params: ["tc"], build: (p) => `${API_BASE}/ailepro.php?tc=${p.tc}` },
            kardes: { name: "Kardeş Sorgula", params: ["tc"], build: (p) => `${API_BASE}/kardes.php?tc=${p.tc}` },
            adres: { name: "Adres Sorgula", params: ["tc"], build: (p) => `${API_BASE}/adres.php?tc=${p.tc}` },
            iban: { name: "IBAN Sorgula", params: ["iban"], build: (p) => `${API_BASE}/iban.php?iban=${p.iban}` },
            operator: { name: "GSM Operatör", params: ["gsm"], build: (p) => `${API_BASE}/gncloperator.php?numara=${p.gsm}` },
            tcgsm: { name: "TC'den GSM", params: ["tc"], build: (p) => `${API_BASE}/tcgsm.php?tc=${p.tc}` }
        };
        
        let activeQuery = "tc";
        let lastRawResult = "";
        
        // sorgu çalıştır (asenkron ama donma yok)
        async function executeQuery(queryKey, paramValues) {
            const def = QUERIES[queryKey];
            if (!def) return;
            const params = {};
            for (let p of def.params) {
                let val = paramValues[p];
                if (!val && val !== 0) {
                    alert(`Lütfen "${p}" alanını doldurun!`);
                    return;
                }
                params[p] = encodeURIComponent(val);
            }
            const url = def.build(params);
            // sonuç div'ine yükleniyor yaz
            const resultDiv = document.getElementById("resultView");
            if (resultDiv) resultDiv.innerHTML = "<span style='color:cyan'>⏳ Sorgulanıyor, bekleyin...</span>";
            const data = await fastFetch(url);
            let pretty = JSON.stringify(data, null, 2);
            lastRawResult = pretty;
            if (resultDiv) {
                resultDiv.innerHTML = `<pre style="white-space:pre-wrap;font-family:monospace;">${escapeHtml(pretty)}</pre>`;
            }
            const downBtn = document.getElementById("downloadBtn");
            if (downBtn) downBtn.style.display = "inline-block";
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function downloadTxt() {
            if (!lastRawResult) return alert("Önce bir sorgu yapın!");
            const blob = new Blob([lastRawResult], {type: "text/plain"});
            const a = document.createElement("a");
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = `sorgu_${activeQuery}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // ========== PANEL RENDER (hızlı dom) ==========
        let sideMenuOpenFlag = false;
        
        function buildSideMenu() {
            let old = document.getElementById("globalSideMenu");
            if (old) old.remove();
            const menuDiv = document.createElement("div");
            menuDiv.id = "globalSideMenu";
            menuDiv.className = "side-menu";
            let itemsHtml = `<button class="menu-close" id="closeSideMenuBtn">✖</button>
                             <h3 style="margin:0 0 12px 12px;">📂 Sorgular</h3>`;
            for (let [key, val] of Object.entries(QUERIES)) {
                itemsHtml += `<div class="menu-item" data-query="${key}">🔹 ${val.name}</div>`;
            }
            itemsHtml += `<div class="menu-item logout-menu" id="logoutMenuItem">🚪 Çıkış Yap</div>`;
            menuDiv.innerHTML = itemsHtml;
            document.body.appendChild(menuDiv);
            
            document.getElementById("closeSideMenuBtn").addEventListener("click", () => toggleSideMenu(false));
            document.querySelectorAll(".menu-item[data-query]").forEach(el => {
                el.addEventListener("click", (e) => {
                    const q = el.getAttribute("data-query");
                    activeQuery = q;
                    toggleSideMenu(false);
                    renderMainPanel();
                });
            });
            document.getElementById("logoutMenuItem").addEventListener("click", () => {
                toggleSideMenu(false);
                logout();
            });
        }
        
        function toggleSideMenu(open) {
            const menu = document.getElementById("globalSideMenu");
            if (!menu) return;
            if (open) {
                menu.classList.add("open");
                sideMenuOpenFlag = true;
            } else {
                menu.classList.remove("open");
                sideMenuOpenFlag = false;
            }
        }
        
        function renderMainPanel() {
            const def = QUERIES[activeQuery];
            const paramsHtml = def.params.map(p => `
                <div class="input-field">
                    <label>${p.toUpperCase()}</label>
                    <input type="text" id="param_${p}" placeholder="${p} değeri girin" autocomplete="off">
                </div>
            `).join('');
            
            const html = `
                <div class="top-bar">
                    <div class="logo-area">
                        <h1>⚡ CCMUMYA SORGU 2026</h1>
                        <p>gelişmiş veri sorgulama</p>
                    </div>
                    <div class="hamburger" id="hamburgerBtn">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="welcome-card">
                    <div style="font-size:1.2rem;">✨ Hoş geldin, <strong>${escapeHtml(currentUser.username)}</strong> ✨</div>
                    <p style="margin-top:6px;">Ana menüdeki 3 çizgiye tıklayarak tüm sorgu araçlarına eriş.</p>
                </div>
                <div class="query-panel">
                    <h3>${def.name}</h3>
                    <div class="input-group" id="queryInputsArea">
                        ${paramsHtml}
                    </div>
                    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
                        <button id="executeQueryBtn">🚀 Sorgula</button>
                        <button id="downloadBtn" class="download-btn" style="display:none;">📥 TXT İndir</button>
                    </div>
                    <div id="resultView" class="result-area">Sorgu sonucu burada görünecek...</div>
                </div>
                <footer>🔒 Gelişmiş koruma | @SiberciAlemde v4.0 | Hızlı Sorgu Motoru</footer>
            `;
            document.getElementById("appRoot").innerHTML = html;
            
            document.getElementById("executeQueryBtn").addEventListener("click", () => {
                const paramVals = {};
                for (let p of def.params) {
                    let inp = document.getElementById(`param_${p}`);
                    if (inp) paramVals[p] = inp.value.trim();
                }
                executeQuery(activeQuery, paramVals);
            });
            const downBtn = document.getElementById("downloadBtn");
            if (downBtn) downBtn.addEventListener("click", downloadTxt);
            
            const hamburger = document.getElementById("hamburgerBtn");
            if (hamburger) hamburger.addEventListener("click", (e) => {
                e.stopPropagation();
                buildSideMenu();
                toggleSideMenu(true);
            });
            // side menu varsa kapatmak için dışarı tıklama
            document.addEventListener("click", function outsideHandler(e) {
                const menuPanel = document.getElementById("globalSideMenu");
                if (sideMenuOpenFlag && menuPanel && !menuPanel.contains(e.target) && !e.target.closest(".hamburger")) {
                    toggleSideMenu(false);
                }
            });
        }
        
        // ========== AUTH EKRANI ==========
        let authMode = "login";
        function renderAuth() {
            const isLogin = authMode === "login";
            const html = `
                <div class="auth-card">
                    <h2 style="margin-bottom:24px;">${isLogin ? "🔐 Giriş Yap" : "📝 Kayıt Ol"}</h2>
                    <div class="input-field">
                        <label>Kullanıcı Adı</label>
                        <input type="text" id="authUser" placeholder="kullanıcı adı">
                    </div>
                    <div class="input-field">
                        <label>Şifre</label>
                        <input type="password" id="authPass" placeholder="••••••">
                    </div>
                    <button id="authButton">${isLogin ? "Giriş Yap" : "Kaydol"}</button>
                    <div class="switch-auth" id="switchModeBtn">${isLogin ? "Hesabın yok mu? Kayıt ol" : "Zaten hesabın var mı? Giriş yap"}</div>
                    <div id="authMsg" style="margin-top:14px; color:#ffaa77;"></div>
                </div>
                <footer>🔐 CCMUMYA Sorgu Sistemi | Güvenli Sorgulama</footer>
            `;
            document.getElementById("appRoot").innerHTML = html;
            
            document.getElementById("authButton").addEventListener("click", () => {
                const user = document.getElementById("authUser").value.trim();
                const pass = document.getElementById("authPass").value.trim();
                const msgDiv = document.getElementById("authMsg");
                if (!user || !pass) { msgDiv.innerText = "Kullanıcı adı ve şifre boş olamaz!"; return; }
                if (isLogin) {
                    if (loginUser(user, pass)) {
                        renderMainPanel();
                    } else {
                        msgDiv.innerText = "Hatalı kullanıcı adı veya şifre!";
                    }
                } else {
                    if (registerUser(user, pass)) {
                        msgDiv.innerText = "Kayıt başarılı! Şimdi giriş yapabilirsin.";
                        authMode = "login";
                        renderAuth();
                    } else {
                        msgDiv.innerText = "Bu kullanıcı adı zaten alınmış!";
                    }
                }
            });
            document.getElementById("switchModeBtn").addEventListener("click", () => {
                authMode = isLogin ? "register" : "login";
                renderAuth();
            });
        }
        
        // BAŞLAT: session kontrolü
        const sess = loadSession();
        if (sess) {
            currentUser = sess;
            renderMainPanel();
        } else {
            renderAuth();
        }
        
        // Önlem: konsolda gizli bilgi gösterme
        console.log("%c🔒 Sorgu Paneli Aktif | Hızlı & Güvenli", "color:#0ff; font-size:12px");
    })();
</script>
</body>
</html>
